version: '3.8'

services:
  supabase-db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db-obb7umbk0gs648rprjwjd15p
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Noumaanr@2026}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  supabase-auth:
    image: supabase/gotrue:v2.132.3
    container_name: supabase-auth-obb7umbk0gs648rprjwjd15p
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://api.89.116.27.217.sslip.io}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-Noumaanr@2026}@supabase-db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_APP_URL:-https://fonzkart.in}
      GOTRUE_API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://api.89.116.27.217.sslip.io}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_SMTP_HOST: "89.116.27.217"
      GOTRUE_SMTP_PORT: "25"
      GOTRUE_SMTP_USER: "noreply@fonzkart.in"
      GOTRUE_SMTP_PASS: "Noumaanr@2026"
      GOTRUE_SMTP_ADMIN_EMAIL: "noreply@fonzkart.in"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    restart: unless-stopped

  supabase-rest:
    image: postgrest/postgrest:v10.1.1
    container_name: supabase-rest-obb7umbk0gs648rprjwjd15p
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:-Noumaanr@2026}@supabase-db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
    restart: unless-stopped

  supabase-kong:
    image: kong:2.8.1
    container_name: supabase-kong-obb7umbk0gs648rprjwjd15p
    ports:
      - "8081:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - /data/coolify/services/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    restart: unless-stopped

  supabase-studio:
    image: supabase/studio:latest
    container_name: supabase-studio-obb7umbk0gs648rprjwjd15p
    ports:
      - "3001:3000"
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-pg-meta:8080
    healthcheck:
      disable: true
    restart: unless-stopped

  supabase-pg-meta:
    image: supabase/postgres-meta:v0.96.6
    container_name: supabase-pg-meta-obb7umbk0gs648rprjwjd15p
    environment:
      PG_META_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD:-Noumaanr@2026}@supabase-db:5432/postgres?sslmode=disable
    restart: unless-stopped

volumes:
  supabase_db_data:
