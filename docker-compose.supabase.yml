version: '3.8'

services:
  # --- Database ---
  db:
    image: supabase/postgres:15.1.0.117
    container_name: supabase-db
    environment:
      POSTGRES_PASSWORD: skillhancer_db_pass
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- API Gateway (Kong) ---
  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    depends_on:
      - db
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    ports:
      - "8081:8000"

  # --- Auth (GoTrue) ---
  auth:
    image: supabase/gotrue:v2.132.3
    container_name: supabase-auth
    depends_on:
      - db
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:skillhancer_db_pass@db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: skillhancer_jwt_secret
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"

  # --- PostgREST ---
  rest:
    image: postgrest/postgrest:v10.1.1
    container_name: supabase-rest
    depends_on:
      - db
    environment:
      PGRST_DB_URI: postgres://postgres:skillhancer_db_pass@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_JWT_SECRET: skillhancer_jwt_secret

  # --- Studio (Dashboard) ---
  studio:
    image: supabase/studio:latest
    container_name: supabase-studio
    ports:
      - "3001:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      STUDIO_PG_META_URL: http://db:8080

volumes:
  supabase_db_data:
