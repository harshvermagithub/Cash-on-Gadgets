<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonzkart Portrait Ad</title>
    <!-- Import modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #022c22; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        .ad-container { width: 100%; height: 100%; max-width: 540px; position: relative; overflow: hidden; background: radial-gradient(circle at 50% 30%, #064e3b 0%, #022c22 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* beautiful pulsating circles background */
        .circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, rgba(251, 191, 36, 0) 70%); }
        .circle1 { width: 800px; height: 800px; top: -200px; left: -300px; animation: pulse 6s infinite alternate; }
        .circle2 { width: 600px; height: 600px; bottom: -100px; right: -200px; animation: pulse 8s infinite alternate-reverse; }
        @keyframes pulse { 0% { transform: scale(0.8); } 100% { transform: scale(1.2); } }
        
        .grid-bg { position: absolute; top:0; left:0; right:0; bottom:0; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: 1; opacity: 0.5;}
        
        .header { position: absolute; top: 5%; text-align: center; width: 100%; z-index: 10; }
        .logo { font-size: 52px; font-weight: 900; color: white; display:flex; align-items:center; justify-content:center; gap: 15px; letter-spacing: -1px; text-shadow: 0 4px 20px rgba(0,0,0,0.5);}
        .logo img { filter: brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
        .logo .highlight { color: #fbbf24; }
        .subtitle { font-size: 24px; color: #a7f3d0; margin-top: 5px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        
        .content { display: flex; align-items: center; justify-content: center; z-index: 10; width: 100%; height: 50%; margin-top: 20%; position: relative; }
        
        /* Device */
        .device-wrapper { width: 55%; height: 500px; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Drop shadow for a premium feel */
        .device { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 25px 35px rgba(0,0,0,0.6)) brightness(1.05) contrast(1.1); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: absolute; opacity: 0; transform: translateY(80px) scale(0.8) rotate(-5deg); image-rendering: -webkit-optimize-contrast; }
        .device.active { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
        .device.exit { opacity: 0; transform: translateY(-80px) scale(1.1) rotate(5deg); transition: all 0.4s ease-in; }
        
        /* Sparks particle effect */
        .spark { position: absolute; width: 8px; height: 8px; background: #fbbf24; border-radius: 50%; box-shadow: 0 0 10px #fbbf24; opacity: 0; z-index: 5; }
        
        /* Note/Price */
        .note-wrapper { width: 45%; position: relative; display: flex; align-items: center; left: -10%; z-index:20;}
        .note { background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%); color: #000; padding: 25px 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.5); transform: rotate(8deg) scale(0) translateX(50px); opacity: 0; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: absolute; font-weight: 800; text-align: center; border: 2px solid #fff; }
        .note::before { content: ''; position: absolute; top: 50%; left: -20px; transform: translateY(-50%); border-width: 15px 20px 15px 0; border-style: solid; border-color: transparent #a7f3d0 transparent transparent; filter: drop-shadow(-5px 0px 5px rgba(0,0,0,0.1));}
        .note.active { transform: rotate(-4deg) scale(1) translateX(0); opacity: 1; }
        .note.exit { transform: rotate(-15deg) scale(0) translateX(-50px); opacity: 0; transition: all 0.4s ease-in; }
        
        .note-lbl { font-size: 20px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; font-weight: 900;}
        .price { font-size: 48px; line-height: 1; font-weight: 900; letter-spacing: -1px; text-shadow: 0 2px 4px rgba(255,255,255,0.5);}
        .model-name { position: absolute; bottom: -50px; left: 0; right: 0; text-align: center; font-size: 24px; color: #fff; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
        .note.active .model-name { opacity: 1; transform: translateY(0); transition-delay: 0.2s;}
        
        /* CTA */
        .cta { position: absolute; bottom: 8%; background: linear-gradient(135deg, #fff 0%, #f3f4f6 100%); color: #064e3b; padding: 20px 60px; border-radius: 50px; font-weight: 900; font-size: 28px; text-transform: uppercase; box-shadow: 0 15px 30px rgba(0,0,0,0.4); animation: bounce 2.5s infinite; z-index: 10; text-decoration: none; border: 4px solid rgba(255,255,255,0.5);}
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-20px) scale(1.05); } 60% { transform: translateY(-10px) scale(1.02); } }
        
        .trust-badges { position: absolute; bottom: 3%; display: flex; gap: 20px; z-index: 10; font-size: 16px; font-weight: 600; color: #a7f3d0;}
        .trust-badge { display: flex; align-items: center; gap: 5px;}
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="grid-bg"></div>
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        
        <div class="header">
            <div class="logo">
                <img src="/fonzkart_brand_logo_transparent.png" alt="Fonzkart" height="80" style="object-fit: contain; max-width: 85%;">
            </div>
            <div class="subtitle">Sell Your Old Phone Instantly!</div>
        </div>
        
        <div class="content">
            <div class="device-wrapper" id="device-container">
                <!-- Images will be injected here -->
            </div>
            
            <div class="note-wrapper" id="note-container">
                <!-- Notes will be injected here -->
            </div>
        </div>
        
        <a href="#" class="cta">Get Cash Now</a>
        
        <div class="trust-badges">
            <div class="trust-badge">✓ Top Price</div>
            <div class="trust-badge">✓ Free Pickup</div>
            <div class="trust-badge">✓ Instant Cash</div>
        </div>
    </div>

    <script>
        const items = [
            { img: '/models/apple/Apple_iPhone_17_Pro_Max_transparent.png', price: '₹1,00,000', name: 'iPhone 17 Pro Max' },
            { img: '/models/samsung/Samsung_Galaxy_S25_Ultra_transparent.png', price: '₹95,000', name: 'Samsung S25 Ultra' },
            { img: '/models/vivo/Vivo_X200_Pro_5G_transparent.png', price: '₹75,000', name: 'Vivo X200 Pro' },
            { img: '/models/oppo/Oppo_Find_X8_Pro_transparent.png', price: '₹62,000', name: 'Oppo Find X8 Pro' },
            { img: '/models/samsung/Samsung_Galaxy_S24_Ultra_transparent.png', price: '₹85,000', name: 'Samsung S24 Ultra' },
            { img: '/models/apple-laptop/Macbook_Pro_2024_transparent.png', price: '₹1,50,000', name: 'MacBook Pro 2024' },
            { img: '/models/apple-tablet/iPad_Pro_M4_13_inch_(WiFi_Cellular)_transparent.png', price: '₹80,000', name: 'iPad Pro M4' },
            { img: '/models/apple-smartwatch/Apple_Watch_Ultra_2_transparent.png', price: '₹45,000', name: 'Apple Watch Ultra 2' }
        ];
        
        let currentIndex = 0;
        const deviceContainer = document.getElementById('device-container');
        const noteContainer = document.getElementById('note-container');
        
        function createSparks() {
            for(let i=0; i<5; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = 50 + (Math.random() * 20 - 10) + '%';
                spark.style.top = 50 + (Math.random() * 20 - 10) + '%';
                deviceContainer.appendChild(spark);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                spark.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1)' },
                    { opacity: 0, transform: `translate(${tx}px, ${ty}px) scale(0)` }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
                }).onfinish = () => spark.remove();
            }
        }
        
        function updateAd() {
            // Remove previous active classes and add exit
            const oldDevice = document.querySelector('.device.active');
            const oldNote = document.querySelector('.note.active');
            
            if (oldDevice) {
                oldDevice.classList.remove('active');
                oldDevice.classList.add('exit');
                setTimeout(() => oldDevice.remove(), 500);
            }
            if (oldNote) {
                oldNote.classList.remove('active');
                oldNote.classList.add('exit');
                setTimeout(() => oldNote.remove(), 500);
            }
            
            // Create new elements
            const item = items[currentIndex];
            
            const newDevice = document.createElement('img');
            newDevice.src = item.img;
            newDevice.className = 'device';
            deviceContainer.appendChild(newDevice);
            
            const newNote = document.createElement('div');
            newNote.className = 'note';
            newNote.innerHTML = '<div class="note-lbl">Get Up To</div><div class="price">' + item.price + '</div>';
            
            // Add model name text
            const modelName = document.createElement('div');
            modelName.className = 'model-name';
            modelName.innerText = item.name;
            newNote.appendChild(modelName);
            
            noteContainer.appendChild(newNote);
            
            // Trigger animation after next paint
            requestAnimationFrame(() => {
                setTimeout(() => {
                    newDevice.classList.add('active');
                    newNote.classList.add('active');
                    createSparks();
                }, 50);
            });
            
            currentIndex = (currentIndex + 1) % items.length;
        }
        
        // Initial call
        setTimeout(updateAd, 500);
        
        // Loop every 2.5 seconds
        setInterval(updateAd, 2500);
    </script>
</body>
</html>
