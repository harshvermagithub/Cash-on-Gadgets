<svg
  width="800"
  height="680"
  viewBox="0 0 100 85"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  style="overflow:visible;"
>
  <!-- Glow fill inside cart basket -->
  <polygon points="22,55 33,60 82,60 90,38 24,38" fill="rgba(34,197,94,0.1)" />

  <!-- Cart body -->
  <path
    d="M5 5H16L24 54C24.7 57.3 27.6 59.5 31 59.5H80C83.2 59.5 85.9 57.5 86.8 54.5L95 33"
    stroke="#16a34a"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Cart accent glow line -->
  <path
    d="M31 59.5H80C83.2 59.5 85.9 57.5 86.8 54.5L95 33"
    stroke="#a3e635"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Wheels -->
  <circle cx="35" cy="72" r="5" stroke="#16a34a" stroke-width="3.5" fill="none" />
  <circle cx="78" cy="72" r="5" stroke="#16a34a" stroke-width="3.5" fill="none" />

  <!-- Wheel inner dots -->
  <circle cx="35" cy="72" r="1.5" fill="#4ade80" />
  <circle cx="78" cy="72" r="1.5" fill="#4ade80" />

  <!-- Smartphone Box Wrapper (Centered & Elevated) -->
  <g transform="translate(42, 22)"> <!-- Translate center point -->
    <g transform="translate(-14.59, -18.24)"> <!-- Offset by half width/height to center -->
        <!-- background and border of phone -->
        <rect
          x="0"
          y="0"
          width="29.18"
          height="43.78"
          rx="4"
          fill="#000000"
          stroke="#334155"
          stroke-width="2"
        />
        
        <!-- F Logo container background -->
        <rect
           x="2.19"
           y="3.28"
           width="24.8"
           height="37.21"
           rx="2"
           fill="#22c55e"
        />

        <!-- Image embedded -->
        <!-- logo_final_v3.png as remote path assuming it'll be mapped by browser, but better to use base64 if standalone. Since it's for their public uploads, an absolute path /logo_final_v3.png might work if used in next.js, but let's just use the file path /logo_final_v3.png -->
        <image
          x="2.19"
          y="3.28"
          width="24.8"
          height="37.21"
          href="/logo_final_v3.png"
          preserveAspectRatio="xMidYMid slice"
        />
    </g>
  </g>
</svg>
