services:
  db:
    image: 'supabase/postgres:15.1.0.117'
    container_name: db-o425knxgyusqx43rmiy6sh07
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-U'
        - postgres
      timeout: 5s
      interval: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: postgres
      COOLIFY_RESOURCE_UUID: o425knxgyusqx43rmiy6sh07
      SERVICE_NAME_DB: db
      SERVICE_NAME_AUTH: auth
    ports:
      - '5432:5432'
    volumes:
      - 'o425knxgyusqx43rmiy6sh07_db-data:/var/lib/postgresql/data'
    restart: unless-stopped
    networks:
      o425knxgyusqx43rmiy6sh07: null
    env_file:
      - .env

  kong:
    image: 'kong:2.8.1'
    container_name: kong-o425knxgyusqx43rmiy6sh07
    depends_on:
      - db
    environment:
      KONG_DATABASE: 'off'
      KONG_PROXY_LISTEN: '0.0.0.0:8000'
      COOLIFY_RESOURCE_UUID: o425knxgyusqx43rmiy6sh07
      SERVICE_NAME_KONG: kong
    ports:
      - '8081:8000'
    volumes:
      - 'o425knxgyusqx43rmiy6sh07_kong-config:/etc/kong'
    restart: unless-stopped
    networks:
      o425knxgyusqx43rmiy6sh07: null
    env_file:
      - .env

  auth:
    image: 'supabase/gotrue:v2.132.3'
    container_name: auth-o425knxgyusqx43rmiy6sh07
    depends_on:
      - db
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: 'postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable'
      GOTRUE_SITE_URL: '${APP_URL}'
      GOTRUE_JWT_SECRET: '${JWT_SECRET}'
      API_EXTERNAL_URL: 'http://localhost:8081'
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'false'
      COOLIFY_RESOURCE_UUID: o425knxgyusqx43rmiy6sh07
      SERVICE_NAME_AUTH: auth
    ports:
      - '9999:9999'
    restart: unless-stopped
    networks:
      o425knxgyusqx43rmiy6sh07: null
    env_file:
      - .env

  rest:
    image: 'postgrest/postgrest:v10.1.1'
    container_name: rest-o425knxgyusqx43rmiy6sh07
    depends_on:
      - db
    environment:
      PGRST_DB_URI: 'postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres'
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: '${JWT_SECRET}'
      COOLIFY_RESOURCE_UUID: o425knxgyusqx43rmiy6sh07
      SERVICE_NAME_REST: rest
    restart: unless-stopped
    networks:
      o425knxgyusqx43rmiy6sh07: null
    env_file:
      - .env

  studio:
    image: 'supabase/studio:latest'
    container_name: studio-o425knxgyusqx43rmiy6sh07
    ports:
      - '3000:3000'
    environment:
      SUPABASE_URL: 'http://kong:8000'
      STUDIO_PG_META_URL: 'http://db:8080'
      COOLIFY_RESOURCE_UUID: o425knxgyusqx43rmiy6sh07
      SERVICE_NAME_STUDIO: studio
    restart: unless-stopped
    networks:
      o425knxgyusqx43rmiy6sh07: null
    env_file:
      - .env

volumes:
  o425knxgyusqx43rmiy6sh07_db-data:
    name: o425knxgyusqx43rmiy6sh07_db-data
  o425knxgyusqx43rmiy6sh07_kong-config:
    name: o425knxgyusqx43rmiy6sh07_kong-config

networks:
  o425knxgyusqx43rmiy6sh07:
    name: o425knxgyusqx43rmiy6sh07
    external: true
