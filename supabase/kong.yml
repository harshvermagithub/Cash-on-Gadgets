_format_version: "1.1"

services:
  - name: auth
    url: http://supabase-auth:9999
    routes:
      - name: auth
        paths:
          - /auth/v1
        strip_path: true
  - name: rest
    url: http://supabase-rest:3000
    routes:
      - name: rest
        paths:
          - /rest/v1
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - DNT
        - Keep-Alive
        - User-Agent
        - X-Requested-With
        - If-Modified-Since
        - Cache-Control
        - Content-Type
        - Range
        - Authorization
        - apikey
        - X-Client-Info
      exposed_headers:
        - Content-Length
        - Content-Range
      max_age: 3600
      credentials: true
